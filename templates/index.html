<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>AI-Based Sentiment Analyzer</h1>
        <p>Analyze text as positive or negative.</p>

        <form method="POST">
            <textarea name="text" rows="6" placeholder="Enter review or text here..." required>{{ text }}</textarea>
            <button type="submit">Analyze Sentiment</button>
        </form>

        {% if result %}
        <div class="result-box">
            <h2>Result</h2>
            <p><strong>Sentiment:</strong> {{ result.label }}</p>
            <p><strong>Confidence:</strong> {{ result.score }}%</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
